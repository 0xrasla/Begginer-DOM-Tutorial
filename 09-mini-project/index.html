<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      color: #333;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #4CAF50;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #45a049;
    }

    .todo-list {
      list-style: none;
      padding: 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      margin-bottom: 8px;
      background-color: white;
      border-radius: 8px;
      border: 1px solid #eee;
      transition: all 0.2s;
    }

    .todo-item:hover {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .todo-text {
      cursor: pointer;
      flex: 1;
      user-select: none;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .delete-btn {
      background-color: #f44336;
      padding: 6px 12px;
      font-size: 14px;
      margin-left: 12px;
    }

    .delete-btn:hover {
      background-color: #d32f2f;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 40px 0;
    }
  </style>
</head>
<body>
  <h1>My To-Do List</h1>

  <div class="input-group">
    <input type="text" id="todoInput" placeholder="Add a new task...">
    <button id="addBtn">Add</button>
  </div>

  <ul class="todo-list" id="todoList"></ul>
  <p class="empty-state" id="emptyState">No tasks yet. Add one above!</p>

  <script src="app.js"></script>
</body>
</html>
